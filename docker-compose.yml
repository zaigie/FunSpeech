# FunSpeech 微服务编排
#
# 服务拓扑:
#   gateway       (CPU)  -> 8000 -> 对外 HTTP/WS API (Aliyun + OpenAI 兼容)
#   funasr-0      (GPU)  -> 8001 -> Paraformer / SenseVoice + VAD/PUNC
#   dolphin-0     (GPU)  -> 8002 -> Dolphin 离线
#   qwen3-asr-0   (GPU)  -> 8003 -> Qwen3-ASR (vLLM 内嵌加速)
#   cosyvoice-0                (GPU)  -> 8004 -> CosyVoice2/3 + 音色管理
#   qwen3-tts-0                (GPU)  -> 8005 -> Qwen3-TTS 开源本地推理
#   qwen3-tts-vllm-omni-0      (GPU)  -> 8006 -> Qwen3-TTS via vLLM-Omni
#   cosyvoice3-vllm-omni-0     (GPU)  -> 8007 -> CosyVoice3 via vLLM-Omni
#
# 启动 (本地有 http://127.0.0.1:7890 代理时):
#   HTTP_PROXY=http://host.docker.internal:7890 \
#   HTTPS_PROXY=http://host.docker.internal:7890 \
#   docker compose build --build-arg HTTP_PROXY --build-arg HTTPS_PROXY
#   docker compose up -d
#
# 启用更多 ASR 引擎:
#   docker compose --profile funasr up -d                        # +funasr (paraformer/sensevoice)
#   docker compose --profile dolphin up -d                       # +dolphin
#   docker compose --profile funasr --profile dolphin up -d      # 全部 ASR 引擎
#
# 切换 TTS 后端:
#   docker compose up -d                                         # 默认 cosyvoice
#   TTS_ENGINE=qwen3-tts docker compose up -d gateway qwen3-asr-0 qwen3-tts-0
#   TTS_ENGINE=qwen3-tts-vllm-omni docker compose up -d gateway qwen3-asr-0 qwen3-tts-vllm-omni-0
#   TTS_ENGINE=cosyvoice3-vllm-omni docker compose up -d gateway qwen3-asr-0 cosyvoice3-vllm-omni-0
#
# 多副本 / 多卡:
#   用 scripts/plan_deployment.py 算出配置, 生成完整 docker-compose.generated.yml
#   见 docs/deployment.md §4.3 / §5

x-gateway-env: &gateway-env
  # 网关到子服务的 URL — 在 docker network 内通过 service name 互访
  FUNASR_SERVICE_URLS: http://funasr-0:8001
  DOLPHIN_SERVICE_URLS: http://dolphin-0:8002
  QWEN3_ASR_SERVICE_URLS: http://qwen3-asr-0:8003
  COSYVOICE_SERVICE_URLS: http://cosyvoice-0:8004
  QWEN3_TTS_SERVICE_URLS: http://qwen3-tts-0:8005
  QWEN3_TTS_VLLM_OMNI_SERVICE_URLS: http://qwen3-tts-vllm-omni-0:8006
  COSYVOICE3_VLLM_OMNI_SERVICE_URLS: http://cosyvoice3-vllm-omni-0:8007
  TTS_ENGINE: ${TTS_ENGINE:-cosyvoice}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-funspeech-internal}
  SERVICE_REQUEST_TIMEOUT: "120"

x-subservice-env: &subservice-env
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-funspeech-internal}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-build-args: &build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,*.local}

x-modelscope-cache: &modelscope-cache
  # 直接 mount 宿主机的 hub/models/ 到容器的 hub/ 位置:
  # - 新版 modelscope (>=1.30) 下到 hub/models/<org>/<model>
  # - 旧版 modelscope (1.20, 子服务用) 下到 hub/<org>/<model>
  # 把宿主机的 models/ 当作容器的 hub/, 两边路径就都对上了。
  type: bind
  source: ${MODELSCOPE_CACHE:-~/.cache/modelscope/hub/models}
  target: /root/.cache/modelscope/hub

x-huggingface-cache: &huggingface-cache
  # Qwen3-TTS 通过 Hugging Face hub / hf-mirror 下载权重。
  type: bind
  source: ${HF_CACHE:-~/.cache/huggingface}
  target: /root/.cache/huggingface

x-nltk-data: &nltk-data
  type: bind
  source: ${NLTK_DATA:-~/.cache/nltk_data}
  target: /root/nltk_data

x-gpu-deploy: &gpu-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  # uv run 启动时会做 bytecode 编译, 短时 fd 用量很高 (commit 00fbeff)。
  # 默认 docker ulimit 偏低, 这里显式调高以防 "Too many open files"。
  ulimits:
    nofile:
      soft: 65535
      hard: 65535


services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/gateway:latest
    container_name: funspeech-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      <<: *gateway-env
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKERS: "1"
      ASR_MODEL_MODE: ${ASR_MODEL_MODE:-all}
      TTS_MODEL_MODE: ${TTS_MODEL_MODE:-all}
      ASR_ENABLE_REALTIME_PUNC: ${ASR_ENABLE_REALTIME_PUNC:-false}
      AUTO_LOAD_CUSTOM_ASR_MODELS: ${AUTO_LOAD_CUSTOM_ASR_MODELS:-}
      APPTOKEN: ${APPTOKEN:-}
      APPKEY: ${APPKEY:-}
    volumes:
      - ./temp:/app/temp
      - ./data:/app/data
      - ./logs:/app/logs
      - *modelscope-cache
    # 不写硬 depends_on: 让网关无论子服务是否就绪都能启动 (对外报 503),
    # 避免一处问题全栈不可用; 哪些子服务真起取决于 docker compose up 实参 +
    # profile, 网关在路由时基于 *_SERVICE_URLS env 决定是否走它们。
    restart: unless-stopped

  funasr-0:
    build:
      context: ./services/funasr
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/funasr:latest
    container_name: funspeech-funasr-0
    environment:
      <<: *subservice-env
      PORT: "8001"
      ASR_MODEL_MODE: ${ASR_MODEL_MODE:-all}
      ASR_DEVICE: cuda:0
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *modelscope-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s
    <<: *gpu-deploy
    restart: unless-stopped
    profiles: ["funasr"]  # 默认不启动, 通过 --profile funasr 启用

  dolphin-0:
    build:
      context: ./services/dolphin
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/dolphin:latest
    container_name: funspeech-dolphin-0
    environment:
      <<: *subservice-env
      PORT: "8002"
      DOLPHIN_DEVICE: cuda
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *modelscope-cache
      - *nltk-data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 180s
    <<: *gpu-deploy
    restart: unless-stopped
    profiles: ["dolphin"]  # 默认不启动, 通过 --profile dolphin 启用

  qwen3-asr-0:
    build:
      context: ./services/qwen3_asr_vllm
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/qwen3-asr:latest
    container_name: funspeech-qwen3-asr-0
    environment:
      <<: *subservice-env
      PORT: "8003"
      # 在线场景: 写 modelscope id, 容器首次启动会自动下载到 mount 的 hub/
      # 离线场景: 改成 /root/.cache/modelscope/hub/Qwen/Qwen3-ASR-1.7B
      # 同时务必设置下面两个 OFFLINE 环境变量, 否则 vLLM 会尝试连 huggingface
      QWEN3_ASR_MODEL_ID: ${QWEN3_ASR_MODEL_ID:-Qwen/Qwen3-ASR-1.7B}
      QWEN3_ASR_GPU_MEM: ${QWEN3_ASR_GPU_MEM:-0.8}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-}
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *modelscope-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s  # vLLM 加载较慢
    <<: *gpu-deploy
    restart: unless-stopped
    # qwen3-asr 是默认 ASR 引擎 (见 app/services/asr/models.json 的 default 字段)

  cosyvoice-0:
    build:
      context: ./services/cosyvoice
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/cosyvoice:latest
    container_name: funspeech-cosyvoice-0
    environment:
      <<: *subservice-env
      PORT: "8004"
      TTS_MODEL_MODE: ${TTS_MODEL_MODE:-all}
      TTS_DEVICE: cuda:0
      CLONE_MODEL_VERSION: ${CLONE_MODEL_VERSION:-cosyvoice3}
      COSYVOICE3_MODEL_ID: ${COSYVOICE3_MODEL_ID:-FunAudioLLM/Fun-CosyVoice3-0.5B-2512}
      TTS_LOAD_TRT: ${TTS_LOAD_TRT:-false}
      TTS_ENABLE_FP16: ${TTS_ENABLE_FP16:-false}
      TTS_LOAD_VLLM: ${TTS_LOAD_VLLM:-false}
      VOICES_DIR: /app/voices
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *modelscope-cache
      - ./voices:/app/voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    <<: *gpu-deploy
    restart: unless-stopped

  qwen3-tts-0:
    build:
      context: ./services/qwen3_tts
      dockerfile: Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/qwen3-tts:latest
    container_name: funspeech-qwen3-tts-0
    environment:
      <<: *subservice-env
      PORT: "8005"
      QWEN3_TTS_MODEL_ID: ${QWEN3_TTS_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      QWEN3_TTS_DEVICE: cuda:0
      QWEN3_TTS_DTYPE: ${QWEN3_TTS_DTYPE:-bfloat16}
      QWEN3_TTS_ATTN_IMPLEMENTATION: ${QWEN3_TTS_ATTN_IMPLEMENTATION:-sdpa}
      QWEN3_TTS_LANGUAGE: ${QWEN3_TTS_LANGUAGE:-Auto}
      QWEN3_TTS_GPU_CONCURRENCY: ${QWEN3_TTS_GPU_CONCURRENCY:-1}
      QWEN3_TTS_VOICES_DIR: /app/qwen3_voices
      QWEN3_TTS_X_VECTOR_ONLY_MODE: ${QWEN3_TTS_X_VECTOR_ONLY_MODE:-false}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-}
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *modelscope-cache
      - *huggingface-cache
      - ./qwen3_voices:/app/qwen3_voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 300s
    <<: *gpu-deploy
    restart: unless-stopped
    profiles: ["qwen3-tts"]

  qwen3-tts-vllm-omni-0:
    build:
      context: .
      dockerfile: services/qwen3_tts_vllm_omni/Dockerfile
      args: *build-args
    image: docker.cnb.cool/nexa/funspeech/qwen3-tts-vllm-omni:latest
    container_name: funspeech-qwen3-tts-vllm-omni-0
    environment:
      <<: *subservice-env
      PORT: "8006"
      QWEN3_TTS_OMNI_MODEL_ID: ${QWEN3_TTS_OMNI_MODEL_ID:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      QWEN3_TTS_OMNI_TASK_TYPE: ${QWEN3_TTS_OMNI_TASK_TYPE:-Base}
      QWEN3_TTS_OMNI_VOICES_DIR: /app/qwen3_omni_voices
      QWEN3_TTS_OMNI_SERVE_COMMAND: ${QWEN3_TTS_OMNI_SERVE_COMMAND:-vllm}
      QWEN3_TTS_OMNI_GPU_MEM: ${QWEN3_TTS_OMNI_GPU_MEM:-}
      QWEN3_TTS_OMNI_STAGE_OVERRIDES: ${QWEN3_TTS_OMNI_STAGE_OVERRIDES:-}
      QWEN3_TTS_OMNI_EXTRA_ARGS: ${QWEN3_TTS_OMNI_EXTRA_ARGS:-}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-}
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *huggingface-cache
      - ./qwen3_omni_voices:/app/qwen3_omni_voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 600s
    shm_size: "2g"
    <<: *gpu-deploy
    restart: unless-stopped
    profiles: ["qwen3-tts-vllm-omni"]

  cosyvoice3-vllm-omni-0:
    build:
      context: .
      dockerfile: services/cosyvoice3_vllm_omni/Dockerfile
      args:
        <<: *build-args
        INSTALL_ONNXRUNTIME_GPU: ${COSYVOICE3_OMNI_INSTALL_ONNXRUNTIME_GPU:-false}
    image: docker.cnb.cool/nexa/funspeech/cosyvoice3-vllm-omni:latest
    container_name: funspeech-cosyvoice3-vllm-omni-0
    environment:
      <<: *subservice-env
      PORT: "8007"
      COSYVOICE3_OMNI_MODEL_ID: ${COSYVOICE3_OMNI_MODEL_ID:-FunAudioLLM/Fun-CosyVoice3-0.5B-2512}
      COSYVOICE3_OMNI_VOICES_DIR: /app/cosyvoice3_omni_voices
      COSYVOICE3_OMNI_SERVE_COMMAND: ${COSYVOICE3_OMNI_SERVE_COMMAND:-vllm}
      COSYVOICE3_OMNI_GPU_MEM: ${COSYVOICE3_OMNI_GPU_MEM:-}
      COSYVOICE3_OMNI_STAGE_OVERRIDES: ${COSYVOICE3_OMNI_STAGE_OVERRIDES:-}
      COSYVOICE3_OMNI_EXTRA_ARGS: ${COSYVOICE3_OMNI_EXTRA_ARGS:-}
      COSYVOICE3_OMNI_FORCE_REF_PER_REQUEST: ${COSYVOICE3_OMNI_FORCE_REF_PER_REQUEST:-true}
      HF_ENDPOINT: ${HF_ENDPOINT:-}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-}
      NVIDIA_VISIBLE_DEVICES: "0"
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - *huggingface-cache
      - ./cosyvoice3_omni_voices:/app/cosyvoice3_omni_voices
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 600s
    shm_size: "2g"
    <<: *gpu-deploy
    restart: unless-stopped
    profiles: ["cosyvoice3-vllm-omni"]


networks:
  default:
    name: funspeech-net
